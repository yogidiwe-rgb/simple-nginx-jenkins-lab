<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Nginx CI/CD App</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
    }

    main {
      width: min(720px, calc(100% - 32px));
      padding: 48px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.16);
      color: #86efac;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    h1 {
      margin: 24px 0 12px;
      font-size: clamp(2.25rem, 6vw, 4.5rem);
      line-height: 1;
    }

    p {
      margin: 0;
      color: #cbd5e1;
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">${APP_ENV}</div>
    <h1>Simple Nginx CI/CD App</h1>
    <p>Built with Docker, deployed with Jenkins and Kubernetes.</p>
  </main>
</body>
</html>
